<!-- codiset-edit.html - 코디세트 편집 페이지 -->
<div class="codiset-edit-container">
    <!-- 헤더 -->
    <div class="codiset-edit-header">
        <button id="btn-codiset-edit-back" class="btn-codiset-edit-back" title="뒤로가기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <div class="codiset-edit-header-info">
            <h2 id="codiset-edit-title" class="codiset-edit-title">코디세트</h2>
            <span id="codiset-edit-meta" class="codiset-edit-meta"></span>
        </div>
        <button id="btn-katalk-format" class="btn-katalk-format" title="카톡 양식">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            카톡 양식
        </button>
        <button id="btn-add-set" class="btn-add-set">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            세트 추가
        </button>
    </div>

    <!-- 세트 목록 영역 -->
    <div id="codiset-set-list" class="codiset-set-list">
        <div class="codiset-edit-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                stroke-linejoin="round">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <path d="M12 11h4" />
                <path d="M12 16h4" />
                <path d="M8 11h.01" />
                <path d="M8 16h.01" />
            </svg>
            <p>세트가 없습니다</p>
            <small>'+ 세트 추가' 버튼을 눌러 코디 영역을 만들어보세요</small>
        </div>
    </div>
</div>

<!-- 옵션(색상/사이즈) 선택 팝오버 -->
<div id="codiset-option-popover" class="codiset-option-popover" style="display: none;">
    <div class="codiset-option-popover-card">
        <div class="codiset-option-popover-header">
            <span id="codiset-option-popover-title" class="codiset-option-popover-title">옵션 선택</span>
            <button id="btn-option-popover-close" class="codiset-option-popover-close" title="닫기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="codiset-option-popover-body">
            <div class="codiset-option-section">
                <span class="codiset-option-label">색상</span>
                <div id="codiset-option-colors" class="codiset-option-chips"></div>
            </div>
            <div id="codiset-option-size-section" class="codiset-option-section" style="display: none;">
                <span class="codiset-option-label">사이즈</span>
                <div id="codiset-option-sizes" class="codiset-option-chips"></div>
            </div>
            <button id="btn-option-add" class="codiset-option-add-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                추가
            </button>
            <div id="codiset-option-selected-list" class="codiset-option-selected-list"></div>
        </div>
        <div class="codiset-option-popover-actions">
            <span id="codiset-option-total" class="codiset-option-total"></span>
        </div>
    </div>
</div>

<!-- 상품 선택 모달 -->
<div id="codiset-product-modal" class="codiset-product-modal-overlay" style="display: none;">
    <div class="codiset-product-modal-backdrop"></div>
    <div class="codiset-product-modal-container">
        <div class="codiset-product-modal-card">
            <div class="codiset-product-modal-header">
                <h3 class="codiset-product-modal-title">상품 선택</h3>
                <button id="btn-product-modal-close" class="codiset-product-modal-close" title="닫기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="codiset-product-modal-toolbar">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="codiset-product-search" class="search-input" placeholder="상품명 검색...">
                </div>
            </div>
            <div class="tag-filter-group" style="margin-bottom: 12px;">
                <span class="tag-filter-label">시즌</span>
                <div class="season-filter" id="codiset-product-season-filter">
                    <button class="season-filter-btn active" data-season="">전체</button>
                    <button class="season-filter-btn" data-season="봄">봄</button>
                    <button class="season-filter-btn" data-season="여름">여름</button>
                    <button class="season-filter-btn" data-season="가을">가을</button>
                    <button class="season-filter-btn" data-season="겨울">겨울</button>
                    <button class="season-filter-btn" data-season="사계절">사계절</button>
                </div>
            </div>
            <div id="codiset-product-list" class="codiset-product-list">
                <div class="codiset-product-empty">상품을 불러오는 중...</div>
            </div>
            <div class="codiset-product-modal-actions">
                <span id="codiset-product-selected-count" class="codiset-product-selected-count">0개 선택</span>
                <button id="btn-product-modal-add" class="codiset-modal-btn codiset-modal-btn-save">추가</button>
            </div>
        </div>
    </div>
</div>

<!-- 카톡 양식 모달 -->
<div id="katalk-modal" class="katalk-modal-overlay" style="display: none;">
    <div class="katalk-modal-backdrop"></div>
    <div class="katalk-modal-container">
        <div class="katalk-modal-card">
            <div class="katalk-modal-header">
                <h3 class="katalk-modal-title">카톡 양식</h3>
                <button id="btn-katalk-modal-close" class="katalk-modal-close" title="닫기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div id="katalk-store-buttons" class="katalk-store-buttons"></div>
            <textarea id="katalk-comment-input" class="katalk-comment-input" placeholder="사용자 지정 코멘트를 입력하세요..."
                rows="2"></textarea>
            <textarea id="katalk-textarea" class="katalk-textarea" rows="10" spellcheck="false"
                placeholder="거래처 버튼을 클릭하면 여기에 양식이 표시됩니다."></textarea>
            <div class="katalk-modal-actions">
                <span id="katalk-selected-store" class="katalk-selected-store"></span>
                <button id="btn-katalk-copy" class="katalk-modal-btn katalk-modal-btn-accent">복사</button>
            </div>
        </div>
    </div>
</div>

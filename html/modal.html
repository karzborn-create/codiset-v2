<!-- modal.html - 삭제 확인 모달 UI (Apple iOS 스타일) -->
<div id="confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
        <div class="modal-card">
            <div class="modal-icon-wrap">
                <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
            </div>
            <h3 class="modal-title">상품 삭제</h3>
            <p class="modal-message" id="modal-message">선택한 상품을 삭제하시겠습니까?</p>
            <p class="modal-sub-message" id="modal-sub-message">이 작업은 되돌릴 수 없습니다.</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="modal-btn modal-btn-cancel">취소</button>
                <button id="modal-btn-confirm" class="modal-btn modal-btn-confirm">삭제</button>
            </div>
        </div>
    </div>
</div>

<!-- codiset.html - 코디세트 페이지 UI -->
<div class="codiset-container">
    <!-- 헤더 영역 -->
    <div class="codiset-header">
        <div class="codiset-header-left">
            <h2 class="codiset-title">코디세트</h2>
            <span id="codiset-count" class="codiset-count">0개</span>
        </div>
        <button id="btn-codiset-create" class="btn-codiset-create">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            코디생성
        </button>
    </div>

    <!-- 툴바: 검색 + 뷰 토글 -->
    <div class="codiset-toolbar">
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="codiset-search" class="search-input" placeholder="코디세트 이름, 메모 검색...">
        </div>
        <div class="view-toggle">
            <button id="btn-codiset-view-card" class="view-toggle-btn active" title="카드 보기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
            </button>
            <button id="btn-codiset-view-list" class="view-toggle-btn" title="리스트 보기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
            </button>
        </div>
        <button id="btn-codiset-select-mode" class="btn-codiset-select-mode" title="선택">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 11 12 14 22 4" />
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
            선택
        </button>
    </div>

    <!-- 선택 모드 툴바 -->
    <div id="codiset-selection-toolbar" class="selection-toolbar" style="display: none;">
        <label class="selection-checkall">
            <input type="checkbox" id="codiset-check-all" class="selection-checkbox">
            <span class="checkmark"></span>
        </label>
        <span id="codiset-selection-count" class="selection-count">0개 선택</span>
        <div class="selection-actions">
            <button id="btn-codiset-delete-selected" class="btn btn-sm btn-danger" title="선택 삭제">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                삭제
            </button>
            <button id="btn-codiset-cancel-selection" class="btn btn-sm btn-outline" title="선택 취소">취소</button>
        </div>
    </div>

    <!-- 시즌 필터 -->
    <div class="tag-filter-group">
        <span class="tag-filter-label">시즌</span>
        <div class="season-filter" id="codiset-season-filter">
            <button class="season-filter-btn active" data-season="">전체</button>
            <button class="season-filter-btn" data-season="봄">봄</button>
            <button class="season-filter-btn" data-season="여름">여름</button>
            <button class="season-filter-btn" data-season="가을">가을</button>
            <button class="season-filter-btn" data-season="겨울">겨울</button>
            <button class="season-filter-btn" data-season="사계절">사계절</button>
        </div>
    </div>

    <!-- 코디세트 목록 영역 -->
    <div id="codiset-grid" class="codiset-grid">
        <div class="codiset-empty" id="codiset-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                stroke-linejoin="round">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <path d="M12 11h4" />
                <path d="M12 16h4" />
                <path d="M8 11h.01" />
                <path d="M8 16h.01" />
            </svg>
            <p>생성된 코디세트가 없습니다</p>
            <small>우측 상단의 '+ 코디생성' 버튼을 눌러 새로운 코디세트를 만들어보세요</small>
        </div>
    </div>
</div>

<!-- 코디세트 생성/편집 모달 -->
<div id="codiset-modal" class="codiset-modal-overlay" style="display: none;">
    <div class="codiset-modal-backdrop"></div>
    <div class="codiset-modal-container">
        <div class="codiset-modal-card">
            <h3 id="codiset-modal-title" class="codiset-modal-title">새 코디세트</h3>

            <!-- 코디세트 이름 -->
            <div class="codiset-form-group">
                <label class="codiset-form-label" for="codiset-name">코디세트 이름</label>
                <input type="text" id="codiset-name" class="codiset-form-input" placeholder="코디세트 이름을 입력하세요"
                    maxlength="50">
            </div>

            <!-- 시즌 태그 -->
            <div class="codiset-form-group">
                <label class="codiset-form-label">시즌 태그</label>
                <div class="codiset-season-select" id="codiset-season-select">
                    <button class="codiset-season-btn" data-season="봄">봄</button>
                    <button class="codiset-season-btn" data-season="여름">여름</button>
                    <button class="codiset-season-btn" data-season="가을">가을</button>
                    <button class="codiset-season-btn" data-season="겨울">겨울</button>
                    <button class="codiset-season-btn" data-season="사계절">사계절</button>
                </div>
            </div>

            <!-- 메모 -->
            <div class="codiset-form-group">
                <label class="codiset-form-label" for="codiset-memo">메모</label>
                <textarea id="codiset-memo" class="codiset-form-textarea" placeholder="코디세트에 대한 메모를 남겨보세요" rows="3"
                    maxlength="200"></textarea>
            </div>

            <!-- 액션 버튼 -->
            <div class="codiset-modal-actions">
                <button id="btn-codiset-cancel" class="codiset-modal-btn codiset-modal-btn-cancel">취소</button>
                <button id="btn-codiset-save" class="codiset-modal-btn codiset-modal-btn-save">생성</button>
            </div>
        </div>
    </div>
</div>

<!-- store-list.html - 샘플 가능 매장 리스트 UI -->
<div class="store-list-container">
    <div class="store-list-header">
        <h2 class="store-list-title">샘플 가능 매장 리스트</h2>
        <span id="store-count" class="store-count">0개</span>
        <button id="btn-store-add" class="btn-store-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            거래처 추가
        </button>
    </div>

    <!-- 매장 테이블 -->
    <div id="store-table-wrapper" class="store-table-wrapper">
        <table class="store-table">
            <thead>
                <tr>
                    <th class="col-name">매장명</th>
                    <th class="col-address">매장주소</th>
                    <th class="col-category">주력카테고리</th>
                    <th class="col-kindness">친절도</th>
                    <th class="col-memo">메모</th>
                </tr>
            </thead>
            <tbody id="store-tbody">
            </tbody>
        </table>
    </div>

    <!-- 빈 상태 -->
    <div class="store-empty" id="store-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <p>등록된 매장이 없습니다</p>
        <small>우측 상단의 '거래처 추가' 버튼을 눌러 매장을 등록해보세요</small>
    </div>
</div>

<!-- 매장 추가 모달 -->
<div id="store-modal" class="store-modal-overlay" style="display: none;">
    <div class="store-modal-backdrop"></div>
    <div class="store-modal-container">
        <div class="store-modal-card">
            <h3 class="store-modal-title" id="store-modal-title">거래처 추가</h3>

            <!-- 매장명 -->
            <div class="store-form-group">
                <label class="store-form-label" for="store-name">매장명</label>
                <input type="text" id="store-name" class="store-form-input" placeholder="매장명을 입력하세요" maxlength="50">
            </div>

            <!-- 매장주소 -->
            <div class="store-form-group">
                <label class="store-form-label" for="store-address">매장주소</label>
                <input type="text" id="store-address" class="store-form-input" placeholder="매장주소를 입력하세요"
                    maxlength="100">
            </div>

            <!-- 주력카테고리 -->
            <div class="store-form-group">
                <label class="store-form-label" for="store-category">주력카테고리</label>
                <input type="text" id="store-category" class="store-form-input" placeholder="예: 여성의류, 남성의류, 악세서리 등"
                    maxlength="50">
            </div>

            <!-- 메모 -->
            <div class="store-form-group">
                <label class="store-form-label" for="store-memo">메모</label>
                <textarea id="store-memo" class="store-form-textarea" placeholder="매장에 대한 메모를 입력하세요" rows="3"
                    maxlength="200"></textarea>
            </div>

            <!-- 친절도 (별점) -->
            <div class="store-form-group">
                <label class="store-form-label">친절도</label>
                <div class="star-rating" id="star-rating">
                    <button class="star-btn" data-star="1">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                    <button class="star-btn" data-star="2">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                    <button class="star-btn" data-star="3">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                    <button class="star-btn" data-star="4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                    <button class="star-btn" data-star="5">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="store-modal-actions">
                <button id="btn-store-cancel" class="store-modal-btn store-modal-btn-cancel">취소</button>
                <button id="btn-store-save" class="store-modal-btn store-modal-btn-save" data-action="add">추가</button>
            </div>
        </div>
    </div>
</div>

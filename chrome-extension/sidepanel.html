<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codiset 수집</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <div class="panel-container">

        <!-- 헤더 -->
        <header class="panel-header">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
            <span class="header-title">Codiset 수집</span>
        </header>

        <!-- 시즌 선택 -->
        <div class="season-selector">
            <label class="season-label">시즌 선택 <span class="required">*</span></label>
            <div class="season-buttons">
                <button class="season-btn" data-season="봄">봄</button>
                <button class="season-btn" data-season="여름">여름</button>
                <button class="season-btn" data-season="가을">가을</button>
                <button class="season-btn" data-season="겨울">겨울</button>
                <button class="season-btn" data-season="사계절">사계절</button>
            </div>
        </div>

        <!-- ACC 선택 (선택 사항) -->
        <div class="season-selector">
            <label class="season-label">ACC 선택 <span class="optional">(선택)</span></label>
            <div class="season-buttons">
                <button class="acc-btn" data-acc="모자">모자</button>
                <button class="acc-btn" data-acc="가방">가방</button>
                <button class="acc-btn" data-acc="신발">신발</button>
                <button class="acc-btn" data-acc="악세서리">악세서리</button>
            </div>
        </div>

        <!-- 수집 버튼 -->
        <button id="btn-collect" class="btn btn-primary btn-block">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            수집
        </button>

        <!-- 미리보기 영역 -->
        <section class="preview-section">
            <div class="section-label">미리보기</div>
            <div id="preview-container" class="preview-card">
                <div class="preview-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>수집 버튼을 눌러 상품 정보를 불러오세요</span>
                </div>
            </div>
        </section>

        <!-- 등록 버튼 -->
        <button id="btn-register" class="btn btn-success btn-block" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            등록
        </button>

        <!-- 상태 메시지 -->
        <div id="status-message" class="status-message"></div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
